<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart-Storage Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .nfc-glow { animation: glow 1.5s infinite alternate; }
        @keyframes glow {
            from { box-shadow: 0 0 5px #6366f1; }
            to { box-shadow: 0 0 20px #6366f1; }
        }
        .map-highlight { fill: #fbbf24 !important; transition: all 0.3s; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">

    <nav class="bg-gray-800 border-b border-gray-700 p-4 sticky top-0 z-50 shadow-2xl">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <h1 class="text-xl font-black text-indigo-400 tracking-tighter uppercase">Nexus Stock</h1>
            <div class="flex gap-4">
                <button onclick="exportData()" class="text-gray-400 hover:text-white"><i class="fas fa-download"></i></button>
                <button onclick="clearAll()" class="text-red-400 hover:text-red-300"><i class="fas fa-trash"></i></button>
            </div>
        </div>
    </nav>

    <main class="p-4 max-w-md mx-auto space-y-6">
        
        <div class="grid grid-cols-2 gap-4">
            <div class="bg-gray-800 p-4 rounded-2xl border border-gray-700">
                <p class="text-gray-400 text-xs uppercase font-bold">Objets</p>
                <p id="stat-count" class="text-2xl font-black">0</p>
            </div>
            <div class="bg-gray-800 p-4 rounded-2xl border border-gray-700 text-indigo-400">
                <p class="text-gray-400 text-xs uppercase font-bold">Zones</p>
                <p class="text-2xl font-black">2</p>
            </div>
        </div>

        <div id="scan-container" class="bg-gray-800 rounded-3xl p-6 border border-indigo-500/30 relative overflow-hidden">
            <div id="scanner-bg" class="absolute inset-0 bg-indigo-500/5 opacity-0 transition-opacity"></div>
            
            <div class="relative z-10 text-center">
                <div id="status-icon" class="text-5xl mb-3 text-indigo-400"><i class="fas fa-compact-disc fa-spin"></i></div>
                <h2 id="status-title" class="text-lg font-bold">Prêt pour un nouveau scan</h2>
                <p id="status-desc" class="text-sm text-gray-400 mb-6">Enregistrez ou recherchez un objet</p>
                
                <button id="btn-main-action" onclick="startNfcSession()" class="w-full bg-indigo-600 hover:bg-indigo-500 py-4 rounded-2xl font-bold shadow-lg shadow-indigo-500/20 transition-all flex items-center justify-center gap-3">
                    <i class="fas fa-wifi fa-rotate-90"></i> ACTIVER LE SCANNER
                </button>
            </div>
        </div>

        <div class="bg-gray-800 rounded-3xl p-6 border border-gray-700">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-xs font-bold text-gray-400 uppercase tracking-widest">Plan Interactif</h3>
                <span class="text-[10px] bg-green-500/20 text-green-400 px-2 py-1 rounded">LIVE</span>
            </div>
            <svg viewBox="0 0 200 120" class="w-full drop-shadow-2xl">
                <g id="map-zones">
                    <rect id="zone-A" x="10" y="10" width="85" height="100" rx="8" fill="#1e1b4b" stroke="#4338ca" stroke-width="2" />
                    <text x="25" y="65" font-size="7" fill="#818cf8" font-family="sans-serif" font-weight="bold">CHAMBRE (A)</text>
                    
                    <rect id="zone-B" x="105" y="10" width="85" height="100" rx="8" fill="#064e3b" stroke="#059669" stroke-width="2" />
                    <text x="125" y="65" font-size="7" fill="#34d399" font-family="sans-serif" font-weight="bold">CUISINE (B)</text>
                </g>
            </svg>
        </div>

        <input type="text" id="search-input" onkeyup="filterItems()" placeholder="Chercher un objet..." class="w-full bg-gray-800 border border-gray-700 rounded-xl p-4 text-sm focus:outline-none focus:border-indigo-500 transition">

        <div id="item-list" class="space-y-3 pb-20">
            </div>
    </main>

    <script>
        let db = JSON.parse(localStorage.getItem('nexus_stock')) || [];
        let sessionMode = 'IDLE'; // IDLE, SCAN_ITEM, SCAN_LOC
        let tempItem = null;

        const mainBtn = document.getElementById('btn-main-action');
        const statusTitle = document.getElementById('status-title');
        const statusDesc = document.getElementById('status-desc');

        async function startNfcSession() {
            if (!('NDEFReader' in window)) {
                alert("NFC non supporté. Utilisez Chrome sur Android.");
                return;
            }

            try {
                const ndef = new NDEFReader();
                await ndef.scan();
                
                updateUI('WAITING');

                ndef.onreading = (event) => {
                    const serial = event.serialNumber;
                    handleNfcLogic(serial);
                };
            } catch (error) {
                alert("Erreur NFC : " + error);
            }
        }

        function handleNfcLogic(serial) {
            // Est-ce un objet déjà connu ?
            const existingItem = db.find(i => i.itemSerial === serial);

            if (existingItem && sessionMode === 'IDLE') {
                // RECHERCHE : On a scanné un objet connu
                highlightZone(existingItem.zone);
                alert(`L'objet "${existingItem.name}" est rangé dans : ${existingItem.location}`);
                resetSession();
            } 
            else if (sessionMode === 'IDLE') {
                // ENREGISTREMENT : Nouvel objet
                const name = prompt("Nouvel objet détecté ! Nom ?");
                if(!name) return resetSession();
                
                tempItem = { 
                    itemSerial: serial, 
                    name: name,
                    date: new Date().toLocaleDateString('fr-FR')
                };
                
                sessionMode = 'SCAN_LOC';
                updateUI('STEP_2');
            } 
            else if (sessionMode === 'SCAN_LOC') {
                // ASSIGNATION : On scanne le badge du tiroir
                const locName = prompt("Nom de l'emplacement (ex: A3, B1) ?", "A1");
                if(!locName) return resetSession();

                tempItem.location = locName;
                tempItem.zone = locName.toUpperCase().startsWith('A') ? 'A' : 'B';
                
                db.unshift(tempItem);
                save();
                resetSession();
                render();
            }
        }

        function updateUI(state) {
            if(state === 'WAITING') {
                mainBtn.innerText = "APPROCHEZ LE BADGE...";
                mainBtn.classList.add('nfc-glow');
                document.getElementById('scanner-bg').style.opacity = "1";
            }
            if(state === 'STEP_2') {
                statusTitle.innerText = "Objet enregistré !";
                statusDesc.innerText = "Maintenant, scannez le badge du TIROIR.";
                mainBtn.innerText = "SCANNEZ LE LIEU";
                mainBtn.classList.replace('bg-indigo-600', 'bg-emerald-600');
            }
        }

        function resetSession() {
            sessionMode = 'IDLE';
            tempItem = null;
            mainBtn.innerText = "ACTIVER LE SCANNER";
            mainBtn.classList.remove('nfc-glow', 'bg-emerald-600');
            mainBtn.classList.add('bg-indigo-600');
            statusTitle.innerText = "Prêt pour un nouveau scan";
            statusDesc.innerText = "Enregistrez ou recherchez un objet";
            document.getElementById('scanner-bg').style.opacity = "0";
        }

        function highlightZone(zoneId) {
            const el = document.getElementById(`zone-${zoneId}`);
            el.classList.add('map-highlight');
            setTimeout(() => el.classList.remove('map-highlight'), 3000);
        }

        function render() {
            const list = document.getElementById('item-list');
            const count = document.getElementById('stat-count');
            list.innerHTML = "";
            count.innerText = db.length;

            db.forEach(item => {
                const zoneColor = item.zone === 'A' ? 'border-indigo-500' : 'border-emerald-500';
                const icon = item.zone === 'A' ? 'fa-bed' : 'fa-utensils';
                
                list.innerHTML += `
                    <div class="bg-gray-800 border-l-4 ${zoneColor} p-4 rounded-xl flex justify-between items-center shadow-lg transition transform active:scale-95">
                        <div>
                            <h4 class="font-bold text-white">${item.name}</h4>
                            <p class="text-xs text-gray-500 uppercase font-mono tracking-tighter">
                                <i class="fas fa-map-marker-alt mr-1"></i> ${item.location} • ${item.date}
                            </p>
                        </div>
                        <div class="text-xl text-gray-600">
                            <i class="fas ${icon}"></i>
                        </div>
                    </div>
                `;
            });
        }

        function save() { localStorage.setItem('nexus_stock', JSON.stringify(db)); }
        function clearAll() { if(confirm("Tout effacer ?")) { db = []; save(); render(); } }
        
        render();
    </script>
</body>
</html>
