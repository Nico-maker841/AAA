<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart-Storage NFC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .nfc-pulse { animation: pulse 2s infinite; }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans">

    <header class="bg-indigo-600 text-white p-6 shadow-lg text-center">
        <h1 class="text-2xl font-black italic tracking-tighter">SMART-STORAGE NFC</h1>
        <p class="text-indigo-100 text-sm">Le GPS de tes objets</p>
    </header>

    <main class="p-4 max-w-md mx-auto">
        
        <div id="scan-zone" class="bg-white rounded-3xl p-8 shadow-xl border-2 border-dashed border-indigo-200 text-center mb-6">
            <div id="scan-icon" class="text-6xl mb-4">📱</div>
            <h2 id="scan-instruction" class="text-xl font-bold text-gray-800">Prêt à ranger ?</h2>
            <p id="scan-step" class="text-gray-500 mb-6">Appuie sur le bouton pour scanner un objet</p>
            
            <button id="btn-scan" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 px-8 rounded-2xl shadow-lg transition-all active:scale-95 w-full">
                SCANNER UN OBJET
            </button>
        </div>

        <div class="bg-white rounded-3xl p-4 shadow-md mb-6">
            <h3 class="text-gray-400 text-xs font-bold uppercase mb-3">Plan de la maison</h3>
            <svg viewBox="0 0 200 120" class="w-full rounded-xl border border-gray-100">
                <rect id="zone-A" x="10" y="10" width="80" height="100" fill="#E0E7FF" stroke="#818CF8" stroke-width="2" />
                <text x="25" y="65" font-size="8" fill="#4338CA" font-weight="bold">CHAMBRE (A)</text>
                <rect id="zone-B" x="110" y="10" width="80" height="100" fill="#DCFCE7" stroke="#4ADE80" stroke-width="2" />
                <text x="125" y="65" font-size="8" fill="#15803D" font-weight="bold">CUISINE (B)</text>
            </svg>
        </div>

        <div id="inventory-list" class="space-y-4">
            <h3 class="text-gray-400 text-xs font-bold uppercase">Derniers rangements</h3>
            </div>
    </main>

    <script>
        let step = 'IDLE'; // IDLE, SCAN_OBJECT, SCAN_LOCATION
        let currentObject = null;

        const btnScan = document.getElementById('btn-scan');
        const instruction = document.getElementById('scan-instruction');
        const stepText = document.getElementById('scan-step');
        const inventoryList = document.getElementById('inventory-list');

        // Simuler une base de données locale
        let db = JSON.parse(localStorage.getItem('smartStorage')) || [];

        btnScan.addEventListener('click', async () => {
            if (!('NDEFReader' in window)) {
                alert("Le NFC n'est pas supporté par ce navigateur (essaie Chrome sur Android).");
                return;
            }

            try {
                const ndef = new NDEFReader();
                await ndef.scan();
                
                // On passe en mode attente de scan
                btnScan.disabled = true;
                btnScan.innerText = "APPROCHE LE BADGE...";
                btnScan.classList.add('nfc-pulse');

                ndef.onreading = event => {
                    const id = event.serialNumber;
                    handleNFC(id);
                };

            } catch (error) {
                console.log(error);
                alert("Erreur : " + error);
            }
        });

        function handleNFC(id) {
            if (step === 'IDLE') {
                // Étape 1 : On scanne l'objet
                currentObject = prompt("Nom de l'objet scanné ?", "Câble USB");
                if(!currentObject) return resetUI();
                
                step = 'SCAN_LOCATION';
                instruction.innerText = "Génial ! Maintenant...";
                stepText.innerText = `Où ranges-tu ton "${currentObject}" ? Scanne le badge du tiroir !`;
                btnScan.innerText = "SCANNE LE TIROIR";
                btnScan.classList.replace('bg-indigo-600', 'bg-green-500');
                
            } else if (step === 'SCAN_LOCATION') {
                // Étape 2 : On scanne le lieu (ex: A3, B2)
                let location = prompt("Nom de l'emplacement ?", "Tiroir A3");
                
                // Enregistrement
                const newItem = {
                    id: Date.now(),
                    name: currentObject,
                    loc: location,
                    zone: location.startsWith('A') ? 'A' : 'B'
                };
                
                db.unshift(newItem);
                localStorage.setItem('smartStorage', JSON.stringify(db));
                
                renderList();
                highlightMap(newItem.zone);
                resetUI();
            }
        }

        function resetUI() {
            step = 'IDLE';
            currentObject = null;
            btnScan.disabled = false;
            btnScan.innerText = "SCANNER UN OBJET";
            btnScan.classList.remove('nfc-pulse');
            btnScan.classList.replace('bg-green-500', 'bg-indigo-600');
            instruction.innerText = "Prêt à ranger ?";
            stepText.innerText = "Appuie sur le bouton pour scanner un objet";
        }

        function highlightMap(zoneId) {
            const rect = document.getElementById(`zone-${zoneId}`);
            if(rect) {
                rect.setAttribute('fill', '#FDE047'); // Clignote en jaune
                setTimeout(() => {
                    rect.setAttribute('fill', zoneId === 'A' ? '#E0E7FF' : '#DCFCE7');
                }, 2000);
            }
        }

        function renderList() {
            inventoryList.innerHTML = '<h3 class="text-gray-400 text-xs font-bold uppercase">Derniers rangements</h3>';
            db.forEach(item => {
                const card = `
                    <div class="bg-white p-4 rounded-2xl shadow-sm border-l-4 ${item.zone === 'A' ? 'border-indigo-500' : 'border-green-500'} flex justify-between items-center">
                        <div>
                            <p class="text-xs text-gray-400 font-bold">${item.loc}</p>
                            <h4 class="font-bold text-gray-800">${item.name}</h4>
                        </div>
                        <span class="text-2xl">${item.zone === 'A' ? '🛏️' : '🍳'}</span>
                    </div>
                `;
                inventoryList.innerHTML += card;
            });
        }

        renderList();
    </script>
</body>
</html>
